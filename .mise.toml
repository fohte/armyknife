[env]
# Share target dir across worktrees to avoid full recompilation
CARGO_TARGET_DIR = "{{config_root}}/target"

[tools]
lefthook = "2.1.8"
"github:ast-grep/ast-grep" = "0.42.3"

# lefthook hooks
actionlint = "1.7.12"
node = "24.15.0"
pinact = "3.10.1"
"github:fohte/basefmt" = "0.1.0"
"npm:@commitlint/cli" = "21.0.1"
"npm:prettier" = "3.8.3"
shellcheck = "0.11.0"
shfmt = "3.13.1"

# sandbox runtime for tests
"npm:@anthropic-ai/sandbox-runtime" = "0.0.42"

[tasks.test]
description = "Run tests in sandbox"
# TMPDIR must point to a path on srt's write-allow list; otherwise tempfile-
# based tests fail inside the sandbox. /tmp/claude is allow-listed by default.
run = [
  "mkdir -p /tmp/claude",
  "cargo test --no-run",
  "srt --settings ./srt-settings.json cargo test",
]
[tasks.test.env]
# Disable sccache (if configured locally) to avoid sandbox permission issues
RUSTC_WRAPPER = ""
# srt reads both CLAUDE_CODE_TMPDIR and CLAUDE_TMPDIR depending on its version.
CLAUDE_CODE_TMPDIR = "/tmp/claude"
CLAUDE_TMPDIR = "/tmp/claude"
