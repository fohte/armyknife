[env]
# Share target dir across worktrees to avoid full recompilation
CARGO_TARGET_DIR = "{{config_root}}/target"

[tools]
lefthook = "2.1.9"
"github:ast-grep/ast-grep" = "0.43.0"

# lefthook hooks
actionlint = "1.7.12"
"github:betterleaks/betterleaks" = "1.5.0"
node = "24.16.0"
pinact = "4.1.0"
"github:fohte/basefmt" = "0.1.0"
"npm:@commitlint/cli" = "21.0.2"
"npm:prettier" = "3.8.4"
shellcheck = "0.11.0"
shfmt = "3.13.1"

# sandbox runtime for tests
"npm:@anthropic-ai/sandbox-runtime" = "0.0.52"

[tasks.test]
description = "Run tests in sandbox"
# srt was originally built for Claude Code's sandbox and hard-codes Claude
# Code conventions: /tmp/claude is the only tmp path in its default write-
# allow list, and it picks the sandbox-injected TMPDIR from the host
# CLAUDE_CODE_TMPDIR / CLAUDE_TMPDIR env (falling back to /tmp/claude).
# We adopt those conventions rather than fight them.
#
# Without this:
#   - When the caller exports CLAUDE_CODE_TMPDIR (e.g. Claude Code sets a
#     UID-suffixed /tmp/claude-<uid>), srt forwards that value into the
#     sandbox as TMPDIR, but the path is not on srt's write-allow list, so
#     every TempDir-using test fails with EPERM.
#   - When no env is set, srt defaults TMPDIR to /tmp/claude, which is
#     fine but only exists if something created it.
run = [
  "mkdir -p /tmp/claude",
  "cargo test --no-run",
  "srt --settings ./srt-settings.json cargo test",
]
[tasks.test.env]
# Disable sccache (if configured locally) to avoid sandbox permission issues
RUSTC_WRAPPER = ""
# Override whatever the host exports so srt always lands on its own
# default-allowed path. The two var names cover both naming schemes srt has
# used across versions.
CLAUDE_CODE_TMPDIR = "/tmp/claude"
CLAUDE_TMPDIR = "/tmp/claude"
